<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plus Network</title>
    <style>
        :root {
            --bg-principal: #090e17;
            --bg-tarjeta: #121b2d;
            --texto-blanco: #ffffff;
            --texto-gris: #8899a6;
            --azul-pulses: #4ea2e6;
            --logo-morado: #d53f8c;
            --borde-sutil: #1e2d4a;
        }

        body { font-family: '-apple-system', BlinkMacSystemFont, sans-serif; background-color: #111; margin: 0; padding: 0; display: flex; justify-content: center; color: var(--texto-blanco); }
        .app-container { width: 100%; max-width: 450px; background: var(--bg-principal); min-height: 100vh; position: relative; padding-bottom: 80px; box-sizing: border-box; }
        
        .app-header { background: var(--bg-principal); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde-sutil); position: sticky; top: 0; z-index: 10; }
        .brand-logo { font-size: 26px; font-weight: 900; color: var(--logo-morado); margin: 0; padding-left: 5px; }
        .header-icons { display: flex; gap: 5px; align-items: center; }
        .top-action-btn { background: none; border: none; color: var(--texto-blanco); padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        
        .seccion-titulo { font-size: 18px; font-weight: bold; margin: 15px 0; display: flex; align-items: center; gap: 8px; }
        .tab-content { padding: 0 20px; }
        .hidden { display: none !important; }

        .stories-wrapper { display: flex; gap: 12px; overflow-x: auto; padding: 15px 0; margin-bottom: 10px; border-bottom: 1px solid var(--borde-sutil); -webkit-overflow-scrolling: touch; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-circle { min-width: 65px; max-width: 65px; height: 65px; border-radius: 50%; border: 2.5px solid var(--logo-morado); display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; cursor: pointer; text-align: center; background: var(--bg-tarjeta); box-sizing: border-box; padding: 2px; overflow: hidden; text-overflow: ellipsis; }
        .story-circle.create { border: 2px dashed var(--texto-gris); color: var(--texto-gris); }
        .story-username { font-size: 11px; color: var(--texto-gris); text-align: center; margin-top: 4px; max-width: 65px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .story-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; box-sizing: border-box; }
        .story-progress-container { position: absolute; top: 25px; left: 5%; width: 90%; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .story-progress-bar { height: 100%; width: 0%; background: var(--texto-blanco); }
        .story-overlay-header { position: absolute; top: 45px; left: 25px; color: var(--texto-blanco); font-weight: bold; font-size: 16px; }
        .story-overlay-content { font-size: 24px; font-weight: bold; text-align: center; color: white; max-width: 90%; }
        .story-overlay-close { position: absolute; top: 40px; right: 25px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }

        .custom-card { background: var(--bg-tarjeta); border-radius: 14px; padding: 14px 18px; margin-bottom: 12px; border: 1px solid transparent; }
        .card-top { display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--texto-gris); font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .pulses-counter { color: var(--azul-pulses); }
        .card-main-text { font-size: 16px; font-weight: bold; margin: 6px 0 0 0; color: var(--texto-blanco); }
        .post-img { width: 100%; border-radius: 10px; margin-top: 10px; object-fit: cover; max-height: 350px; background: var(--bg-principal); }

        .action-bar { display: flex; gap: 20px; margin-top: 12px; border-top: 1px solid var(--borde-sutil); padding-top: 10px; }
        .action-btn { background: none; border: none; color: var(--texto-gris); font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 5px; padding: 0; transition: 0.2s; }
        .action-btn:hover { color: var(--texto-blanco); }
        .action-btn.liked { color: #f91880; }
        .comment-section { background: var(--bg-principal); padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; }

        .notif-container { background: var(--bg-tarjeta); border-radius: 14px; padding: 0; border: 1px solid transparent; }
        .notif-item { padding: 15px 18px; border-bottom: 1px solid var(--borde-sutil); }
        .notif-text { font-size: 15px; color: var(--texto-blanco); font-weight: bold; margin: 0 0 6px 0; }
        .notif-time { font-size: 11px; color: var(--texto-gris); text-transform: uppercase; margin: 0; font-weight: bold; letter-spacing: 0.5px;}

        /* Diseño de Chat */
        .chat-list-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; transition: background 0.2s; }
        .chat-list-item:hover { background: var(--bg-tarjeta); }
        .chat-list-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; background: var(--borde-sutil); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 20px; overflow: hidden; }
        .chat-list-info { flex-grow: 1; border-bottom: 1px solid var(--borde-sutil); padding-bottom: 12px; }
        .chat-list-name { font-size: 15px; font-weight: bold; color: var(--texto-blanco); margin: 0 0 4px 0; }
        .chat-list-preview { font-size: 13px; color: var(--texto-gris); margin: 0; }

        .chat-active-header { display: flex; align-items: center; gap: 12px; padding: 10px 15px; border-bottom: 1px solid var(--borde-sutil); position: sticky; top: 0; background: var(--bg-principal); z-index: 5; }
        .chat-back-btn { background: none; border: none; color: var(--texto-blanco); font-size: 24px; cursor: pointer; padding: 0; display: flex; align-items: center; }
        .chat-active-header-name { font-size: 16px; font-weight: bold; margin: 0; }
        .chat-area-wrapper { display: flex; flex-direction: column; height: 68vh; }
        .chat-messages-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .chat-input-wrapper { display: flex; align-items: center; padding: 12px 15px; background: var(--bg-principal); border-top: 1px solid var(--borde-sutil); gap: 8px; }
        .chat-input-pill { flex-grow: 1; background: var(--bg-tarjeta); border: 1px solid var(--borde-sutil); padding: 12px 15px; border-radius: 25px; color: white; outline: none; font-size: 14px; }
        .chat-send-btn { background: none; border: none; color: var(--azul-pulses); font-weight: bold; font-size: 15px; cursor: pointer; padding: 5px; }

        .chat-bubble { padding: 10px 14px; border-radius: 18px; max-width: 75%; font-size: 15px; line-height: 1.4; word-wrap: break-word; width: fit-content; display: flex; flex-direction: column; }
        .chat-bubble.enviado { background: var(--azul-pulses); color: white; margin-left: auto; border-bottom-right-radius: 4px; }
        .chat-bubble.recibido { background: var(--bg-tarjeta); color: white; margin-right: auto; border-bottom-left-radius: 4px; border: 1px solid var(--borde-sutil); }
        .chat-bubble img { max-width: 100%; border-radius: 10px; margin-bottom: 5px; }

        .post-box { background: var(--bg-tarjeta); border-radius: 14px; padding: 15px; margin-bottom: 20px; border: 1px solid var(--borde-sutil); }
        textarea { width: 100%; padding: 10px 0; border: none; background: transparent; color: var(--texto-blanco); font-size: 18px; resize: none; outline: none; }
        button.btn-plus { width: 100%; padding: 12px; background-color: var(--texto-blanco); color: var(--bg-principal); border: none; border-radius: 25px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button.btn-plus-sec { width: 100%; padding: 12px; background: transparent; color: var(--texto-blanco); border: 1px solid var(--borde-sutil); border-radius: 25px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .btn-follow-action { background: var(--texto-blanco); color: var(--bg-principal); border: none; padding: 6px 16px; border-radius: 20px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .btn-follow-action.following { background: transparent; color: var(--texto-gris); border: 1px solid var(--borde-sutil); }

        .profile-card-header { position: relative; text-align: center; background: var(--bg-tarjeta); border-radius: 14px; margin-bottom: 20px; border: 1px solid var(--borde-sutil); overflow: hidden; }
        .cover-photo { width: 100%; height: 110px; background: #2a3b5c; object-fit: cover; }
        .avatar-circle.overlap { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); border: 4px solid var(--bg-tarjeta); width: 85px; height: 85px; background: var(--bg-principal); border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .avatar-circle.overlap img { width: 100%; height: 100%; object-fit: cover; }
        .profile-info { padding: 45px 15px 15px 15px; }

        .stats-row { display: flex; justify-content: space-around; margin-top: 10px; background: var(--bg-tarjeta); padding: 15px; border-radius: 14px; }
        .stat-box { cursor: pointer; text-align: center; }
        .stat-box span { display: block; font-size: 20px; font-weight: bold; color: var(--texto-blanco); }
        .stat-box label { color: var(--texto-gris); font-size: 12px; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; height: 65px; background: var(--bg-principal); border-top: 1px solid var(--borde-sutil); display: flex; justify-content: space-around; align-items: center; z-index: 10; }
        .nav-btn { background: none; border: none; cursor: pointer; padding: 10px; }
        .nav-icon { width: 26px; height: 26px; stroke: var(--texto-gris); stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
        .nav-btn.active .nav-icon { stroke: var(--texto-blanco); }

        .auth-box { padding: 40px 25px; }
        .auth-input { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--bg-tarjeta); border: 1px solid var(--borde-sutil); border-radius: 10px; color: var(--texto-blanco); box-sizing: border-box; outline: none; font-size: 15px; }
    </style>
</head>
<body>

    <div class="app-container">

        <div id="auth-screen" class="auth-box">
            <h1 style="text-align: center; font-size: 36px; color: var(--logo-morado); margin-bottom: 5px; font-weight: 900;">plus.</h1>
            <p style="text-align: center; color: var(--texto-gris); margin-top: 0; margin-bottom: 40px; font-size: 15px;">Conéctate con tu mundo</p>
            <input type="text" id="username" class="auth-input" placeholder="Nombre de usuario">
            <input type="email" id="email" class="auth-input" placeholder="Correo electrónico">
            <input type="password" id="password" class="auth-input" placeholder="Contraseña">
            <button class="btn-plus" style="margin-top: 15px;" onclick="ejecutarLogin()">Iniciar Sesión</button>
            <button class="btn-plus-sec" onclick="ejecutarRegistro()">Crear cuenta nueva</button>
        </div>

        <div id="main-screen" class="hidden">
            
            <div class="app-header">
                <h1 class="brand-logo">plus.</h1>
                <div class="header-icons">
                    <button class="top-action-btn" onclick="cambiarPestaña('notificaciones')" style="position: relative;">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                        <span id="badge-notif" class="hidden" style="position: absolute; top: 2px; right: 2px; background: #ff4a5a; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 2px; box-sizing: border-box;">0</span>
                    </button>
                    <button class="top-action-btn" onclick="cambiarPestaña('mensajes')" style="position: relative;">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                        <span id="badge-mensajes" class="hidden" style="position: absolute; top: 2px; right: 2px; background: var(--azul-pulses); color: white; font-size: 10px; font-weight: bold; border-radius: 50%; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 2px; box-sizing: border-box;">0</span>
                    </button>
                </div>
            </div>

            <div id="story-viewer" class="story-overlay hidden">
                <div class="story-progress-container"><div id="story-progress-bar" class="story-progress-bar"></div></div>
                <div id="story-viewer-username" class="story-overlay-header">@usuario</div>
                <button class="story-overlay-close" onclick="cerrarVisorHistoria()">×</button>
                <div id="story-viewer-content" class="story-overlay-content">Contenido</div>
            </div>
            
            <div id="tab-notificaciones" class="tab-content hidden">
                <div class="seccion-titulo">🔔 Actividad Reciente</div>
                <div class="notif-container" id="notifications-container"></div>
            </div>

            <div id="tab-mensajes" class="tab-content hidden" style="padding: 0;">
                <div id="chat-list-view">
                    <div class="seccion-titulo" style="padding: 15px 20px;">💬 Mensajes</div>
                    <div id="chat-users-list"></div>
                </div>
                
                <div id="chat-active-view" class="hidden">
                    <div class="chat-active-header">
                        <button class="chat-back-btn" onclick="regresarAListaChats()">←</button>
                        <div class="chat-list-avatar" style="width: 36px; height: 36px;" id="chat-active-avatar">👤</div>
                        <h3 class="chat-active-header-name" id="chat-target-username">@usuario</h3>
                    </div>
                    
                    <div class="chat-area-wrapper">
                        <div id="chat-messages-container" class="chat-messages-scroll"></div>
                        <div class="chat-input-wrapper">
                            <input type="file" id="chat-input-foto" accept="image/*" style="display:none;" onchange="ejecutarEnviarFotoChat(event)">
                            <button class="chat-send-btn" style="color:var(--texto-gris); font-size:20px;" onclick="document.getElementById('chat-input-foto').click()">📸</button>
                            <input type="text" id="chat-input-text" class="chat-input-pill" placeholder="Escribe algo...">
                            <button class="chat-send-btn" onclick="ejecutarEnviarMensaje()">Enviar</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-perfil-ajeno" class="tab-content hidden">
                <button class="btn-plus-sec" style="margin-bottom: 15px; padding: 6px 14px; width: auto; font-size: 13px;" onclick="cambiarPestaña('inicio')">⬅️ Volver</button>
                <div id="user-profile-container"></div>
                <div id="user-feed-container" style="margin-top: 10px;">Cargando publicaciones...</div>
            </div>

            <div id="tab-inicio" class="tab-content">
                <div class="stories-wrapper" id="stories-carousel-container"></div>
                <div id="feed-container">Cargando publicaciones...</div>
            </div>

            <div id="tab-buscar" class="tab-content hidden">
                <div class="seccion-titulo">🔍 Buscar en plus</div>
                <input type="text" id="input-busqueda" class="auth-input" placeholder="Escribe un usuario..." onkeyup="ejecutarBusqueda()">
                <div id="resultados-busqueda">Busca amigos o creadores...</div>
            </div>

            <div id="tab-publicar" class="tab-content hidden">
                <div class="seccion-titulo" style="margin-top: 20px;">Crear un nuevo pulse</div>
                <div class="post-box">
                    <textarea id="post-text" placeholder="¿Qué está pasando hoy?" style="height: 100px;"></textarea>
                    
                    <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 15px;">
                        <input type="file" id="input-post-foto" accept="image/*" style="display:none;" onchange="mostrarPreview(event)">
                        <button class="btn-plus-sec" style="margin:0; width:auto; padding: 8px 15px; border-color: var(--azul-pulses); color: var(--azul-pulses);" onclick="document.getElementById('input-post-foto').click()">📸 Adjuntar foto</button>
                        <img id="preview-post-img" style="width: 50px; height: 50px; object-fit: cover; border-radius: 8px; display: none;">
                    </div>

                    <button id="btn-publicar-accion" class="btn-plus" onclick="ejecutarPublicar()">Publicar ahora</button>
                </div>
            </div>

            <div id="tab-explorar" class="tab-content hidden">
                <div class="seccion-titulo">🌍 Tendencias Mundiales</div>
                <div id="trending-container"></div>
                <div class="seccion-titulo" style="margin-top: 25px;">👤 Personas recomendadas</div>
                <div id="users-container"></div>
            </div>

            <div id="tab-perfil" class="tab-content hidden">
                <div id="profile-container"></div>
                
                <input type="file" id="input-foto-perfil" accept="image/*" style="display:none;" onchange="ejecutarSubirFoto(event, 'perfil')">
                <input type="file" id="input-foto-portada" accept="image/*" style="display:none;" onchange="ejecutarSubirFoto(event, 'portada')">
                
                <div style="display:flex; gap:10px;">
                    <button class="btn-plus-sec" id="btn-cambiar-foto" onclick="document.getElementById('input-foto-perfil').click()">📸 Avatar</button>
                    <button class="btn-plus-sec" id="btn-cambiar-portada" onclick="document.getElementById('input-foto-portada').click()">🎨 Portada</button>
                </div>
                
                <button class="btn-plus-sec" onclick="ejecutarEditarPerfil()">✏️ Editar Biografía</button>
                <button class="btn-plus-sec" style="color: #ff4a5a; border-color: #3e1e24; margin-top: 15px;" onclick="ejecutarLogout()">Cerrar Sesión</button>
            </div>

            <div id="modal-lista-usuarios" class="story-overlay hidden" style="background: rgba(0,0,0,0.7); align-items: center; justify-content: flex-end; padding: 0; z-index: 200;">
                <div style="background: var(--bg-principal); width: 100%; height: 60%; border-top-left-radius: 20px; border-top-right-radius: 20px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column;">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--borde-sutil); padding-bottom: 15px; margin-bottom: 15px;">
                        <h3 id="modal-lista-titulo" style="margin: 0; font-size: 18px;">Lista</h3>
                        <button onclick="cerrarModalLista()" style="background: none; border: none; color: var(--texto-blanco); font-size: 28px; cursor: pointer;">×</button>
                    </div>
                    <div id="modal-lista-contenido" style="flex-grow: 1; overflow-y: auto;"></div>
                </div>
            </div>

            <nav class="bottom-nav">
                <button class="nav-btn active" id="btn-tab-inicio" onclick="cambiarPestaña('inicio')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg></button>
                <button class="nav-btn" id="btn-tab-buscar" onclick="cambiarPestaña('buscar')"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg></button>
                <button class="nav-btn" id="btn-tab-publicar" onclick="cambiarPestaña('publicar')"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg></button>
                <button class="nav-btn" id="btn-tab-explorar" onclick="cambiarPestaña('explorar')"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg></button>
                <button class="nav-btn" id="btn-tab-perfil" onclick="cambiarPestaña('perfil')"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></button>
            </nav>

        </div>
    </div>

    <script>
        function ejecutarRegistro() { const e=document.getElementById('email').value, p=document.getElementById('password').value, u=document.getElementById('username').value; if(!e||!p||!u) return alert("Llena todo."); window.registrarUsuario(e,p,u); }
        function ejecutarLogin() { const e=document.getElementById('email').value, p=document.getElementById('password').value; if(!e||!p) return alert("Faltan datos."); window.iniciarSesion(e,p); }
        function ejecutarPublicar() { const c=document.getElementById('post-text'); if(!c.value.trim() && !document.getElementById('input-post-foto').files[0]) return alert("Escribe algo o añade foto."); window.crearPublicacion(c.value); }
        function mostrarPreview(e) { const f = e.target.files[0]; if(f) { const img = document.getElementById('preview-post-img'); img.src = URL.createObjectURL(f); img.style.display = 'block'; } }
        function ejecutarBusqueda() { window.buscarUsuarios(); }
        function ejecutarEditarPerfil() { window.editarPerfil(); }
        function ejecutarSeguir(uid) { window.toggleSeguirUsuario(uid); }
        function ejecutarLike(postId, ownerUid) { window.darLike(postId, ownerUid); }
        function ejecutarComentar(postId) { window.comentarPost(postId); }
        function ejecutarEliminar(postId) { window.eliminarPost(postId); }
        function ejecutarEliminarComentario(postId, commentStr) { window.borrarComentario(postId, commentStr); }
        function ejecutarLogout() { window.cerrarSesion(); }
        function cambiarPestaña(tab) { window.navegarA(tab); }
        function entrarAlChat(uid, username) { window.abrirChatCon(uid, username); }
        function regresarAListaChats() { window.cerrarChatActivo(); }
        function ejecutarEnviarMensaje() { const inp = document.getElementById('chat-input-text'); if(!inp.value.trim()) return; window.enviarMensajePrivado(inp.value.trim()); inp.value=""; }
        function ejecutarEnviarFotoChat(e) { const f = e.target.files[0]; if(f) window.enviarFotoEnChat(f); }
        function ejecutarBorrarMensaje(mId) { window.borrarMensajeChat(mId); }
        function solicitarCrearHistoria() { const txt = prompt("Historia (Solo texto):"); if(txt && txt.trim()) window.crearNuevaHistoria(txt.trim()); }
        function lanzarVisorHistoria(texto, usuario) { window.reproducirHistoria(texto, usuario); }
        function cerrarVisorHistoria() { window.terminarVisorHistoria(); }
        function verPerfilDe(uid) { window.verPerfilUsuario(uid); }
        function ejecutarSubirFoto(event, tipo) { const file = event.target.files[0]; if(file) window.subirImagenPerfil(file, tipo); }
        function cerrarModalLista() { window.cerrarModalListaUI(); }
        function mostrarSeguidores(uid) { window.verSeguidores(uid); }
        function mostrarSiguiendo(uid) { window.verSiguiendo(uid); }
        function ejecutarRepulse(postId) { window.hacerRepulse(postId); }
    </script>
